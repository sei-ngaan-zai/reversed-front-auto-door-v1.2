<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>逆統戰自動門&mdash; 儀表板</title>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body class="dash-page">
  <header class="topbar">
    <div class="topbar-left">
      <svg width="28" height="28" viewBox="0 0 48 48" fill="none">
        <rect width="48" height="48" rx="10" fill="#6366f1"/>
        <path d="M14 34V20l10-8 10 8v14H28v-8h-8v8H14z" fill="white"/>
      </svg>
      <span class="topbar-title">逆統戰</span>
    </div>
    <div class="topbar-right">
      <span class="badge" id="statusBadge">&#9679; 連接中&hellip;</span>
      <button class="btn btn-sm btn-ghost" id="toggleDebug">偵錯：關</button>
      <button class="btn btn-sm btn-toggle" id="toggleAuto">自動：關</button>
    </div>
  </header>

  <main class="dash-main">
    <div class="col col-left">

      <section class="card">
        <div class="card-header">
          <h2>聯盟 / 派系</h2>
          <span class="tag" id="unionTag">&mdash;</span>
        </div>
        <div class="input-row">
          <input type="text" id="unionInput" placeholder="聯盟 ID"/>
          <button class="btn btn-primary" id="enterUnionBtn">加入</button>
        </div>
        <div class="input-row" style="margin-top:8px;">
          <button class="btn btn-ghost btn-full" id="refreshBtn">&#8635; 重新整理申請者</button>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>申請者</h2>
          <span class="count-badge" id="appliedCount">0</span>
        </div>
        <div id="appliedList" class="user-list">
          <div class="empty-state">無人申請</div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>隊列</h2>
          <span class="count-badge" id="queueCount">0</span>
        </div>
        <div id="queueList" class="tag-list">
          <div class="empty-state">無人排隊</div>
        </div>
      </section>

    </div>
    <div class="col col-right">

      <section class="card">
        <div class="card-header">
          <h2>白名單<span class="dot dot-green"></span></h2>
          <span class="count-badge" id="whiteCount">0</span>
        </div>
        <div class="input-row">
          <input type="number" id="whiteInput" placeholder="用户 ID"/>
          <button class="btn btn-success" id="addWhiteBtn">加入</button>
        </div>
        <div id="whiteList" class="tag-list tag-list-green" style="margin-top:10px;">
          <div class="empty-state">空白</div>
        </div>
      </section>

      <section class="card">
        <div class="card-header">
          <h2>黑名單<span class="dot dot-red"></span></h2>
          <span class="count-badge" id="blackCount">0</span>
        </div>
        <div class="input-row">
          <input type="number" id="blackInput" placeholder="用户 ID"/>
          <button class="btn btn-danger" id="addBlackBtn">加入</button>
        </div>
        <div id="blackList" class="tag-list tag-list-red" style="margin-top:10px;">
          <div class="empty-state">空白</div>
        </div>
      </section>

      <section class="card card-log">
        <div class="card-header">
          <h2>活動日誌</h2>
          <button class="btn btn-sm btn-ghost" id="clearLog">清除</button>
        </div>
        <div id="logBox" class="log-box"></div>
      </section>

    </div>
  </main>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="/static/dashboard.js"></script>
</body>
</html>
